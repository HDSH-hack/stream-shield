policy_id: fintech
extends: default
language: ["ko", "en"]

thresholds:
  safe: 0.30
  block: 0.55          # tightest — financial impact

rules:
  block_phrases:
    - "ignore previous instructions"
    - "이전 지시.*무시"
    - "(transfer|wire|send).*\\$?[0-9]"
    - "(이체|송금).*[0-9]+"
    - "account.*number"
    - "계좌.*번호"
    - "routing.*number"
    - "swift.*code"

domain:
  block_external_dest:
    - "@gmail\\.com"
    - "@outlook\\.com"
    - "@yahoo\\.com"
    - "@protonmail\\.com"
    - "attacker\\."
  pii_categories: ["SSN", "CARD_NUMBER", "CVV", "ACCOUNT", "주민등록번호", "계좌번호", "카드번호"]
  pci_strict: true

receipt:
  enabled: true        # auditable trail required
  sign_alg: ed25519
  signing_key_path: ./.secrets/ed25519.key
