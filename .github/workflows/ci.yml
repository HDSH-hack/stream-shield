name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: backend unittests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install lightweight test deps
        # Skip torch/transformers/onnxruntime — current tests don't need them
        # and they bloat CI install time. Add them back if guard/classifier
        # tests land here.
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml cryptography

      - name: Run unittests
        run: python -m unittest discover -s tests -v

      - name: Smoke-test eval runner (default policy)
        run: python -m stream_shield.eval.runner --policy default

      - name: Smoke-test per-entity compare
        run: python -m stream_shield.eval.compare --diff-only
